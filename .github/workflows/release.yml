name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      old_version: ${{ steps.version.outputs.old_version }}
      new_version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Bump crate version
        id: version
        shell: bash
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          release_type = "${{ github.event.inputs.release_type }}"

          cargo_toml_path = pathlib.Path("Cargo.toml")
          cargo_lock_path = pathlib.Path("Cargo.lock")

          # Read the current version from Cargo.toml.
          manifest = tomllib.loads(cargo_toml_path.read_text(encoding="utf-8"))
          old_version = manifest["package"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", old_version)
          if not match:
              raise SystemExit(f"Unsupported version format: {old_version}")

          major, minor, patch = map(int, match.groups())
          if release_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif release_type == "minor":
              minor, patch = minor + 1, 0
          elif release_type == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported release type: {release_type}")

          new_version = f"{major}.{minor}.{patch}"

          # Update version in Cargo.toml.
          text = cargo_toml_path.read_text(encoding="utf-8")
          text, n = re.subn(
              r'(?m)^version = "' + re.escape(old_version) + r'"$',
              f'version = "{new_version}"',
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit("Could not update version in Cargo.toml")
          cargo_toml_path.write_text(text, encoding="utf-8")

          # Update lobster package version in Cargo.lock.
          cargo_lock = cargo_lock_path.read_text(encoding="utf-8")
          cargo_lock, n = re.subn(
              r'(\[\[package\]\]\nname = "lobster"\nversion = ")'
              + re.escape(old_version)
              + r'(")',
              r'\g<1>' + new_version + r'\g<2>',
              cargo_lock,
              count=1,
          )
          if n != 1:
              raise SystemExit("Could not update lobster version in Cargo.lock")
          cargo_lock_path.write_text(cargo_lock, encoding="utf-8")

          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"old_version={old_version}\n")
              fh.write(f"new_version={new_version}\n")
              fh.write(f"tag=v{new_version}\n")
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${{ steps.version.outputs.new_version }}"

      - name: Push release commit
        id: push
        run: |
          git push origin HEAD:${{ github.ref_name }}
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: bump
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: lobster-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: lobster-aarch64-unknown-linux-gnu
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: lobster-aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --bin lobster

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lobster dist/lobster
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz lobster
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  release:
    name: Create GitHub Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.bump.outputs.tag }}"
          git push origin "${{ needs.bump.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
